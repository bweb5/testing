<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PV Repowering Tools</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#3a3a3a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

.logos{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:60px;
    margin-bottom:30px;
}

.logos img{
    height:70px;
}

h1{
    margin-bottom:50px;
    color:#f0f0f0;
}

.apps{
    display:flex;
    gap:60px;
    justify-content:center;
}

.app{
    text-decoration:none;
    transition: transform .2s ease;
}

.app:hover{
    transform:scale(1.08);
}

.app img{
    width:230px;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,.5);
}

.label{
    margin-top:12px;
    font-weight:600;
    color:#e0e0e0;
}

</style>

</head>

<body>

<div class="container">

<div class="logos">
<img src="./images/nrel.png" alt="NREL Logo">
<img src="./images/unm-ece.png" alt="UNM ECE Logo">
</div>

<h1>PV Repowering Tools</h1>

<div class="apps">

<a class="app" href="./cost/">
<img src="./icons/cost.svg" alt="Cost Calculator">
<div class="label">Cost Model</div>
</a>

<a class="app" href="./warranty/">
<img src="./icons/warranty.svg" alt="Warranty Calculator">
<div class="label">Warranty Model</div>
</a>

</div>

</div>

</body>
</html>
